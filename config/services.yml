# config/services.yaml
parameters:
  api_base_url: '%env(API_BASE_URL)%'
  env(API_BASE_URL): 'http://api.phplist.local/'

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  PhpList\WebFrontend\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/Entity/'
      - '../src/Kernel.php'

  PhpList\WebFrontend\Controller\:
    resource: '../src/Controller'
    public: true
    autowire: true
    tags: ['controller.service_arguments']

  Symfony\Component\HttpFoundation\Session\SessionInterface: '@session'

  PhpList\RestApiClient\Client:
    $baseUrl: '%api_base_url%'

  PhpList\RestApiClient\Endpoint\:
    resource: '../vendor/tatevikgr/rest-api-client/src/Endpoint/'
    autowire: true
    autoconfigure: true

  PhpList\WebFrontend\EventListener\ApiSessionListener:
    tags:
      - { name: kernel.event_subscriber }
